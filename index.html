<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmønskeportal</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel-2:#1f2937;
      --card:#ffffff;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border:#334155;
      --brand:#2563eb;
      --brand-2:#1d4ed8;
      --ok:#16a34a;
      --warn:#f59e0b;
      --danger:#dc2626;
      --chip:#e2e8f0;
      --shadow: 0 10px 30px rgba(0,0,0,.15);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--brand); }
    .container {
      width: min(1200px, calc(100% - 24px));
      margin: 20px auto 40px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(37,99,235,.2), rgba(29,78,216,.05));
      border: 1px solid rgba(96,165,250,.2);
      border-radius: 26px;
      padding: 22px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .hero h1 { margin: 0 0 6px; font-size: clamp(1.4rem, 2vw, 2rem); }
    .hero p { margin: 0; color: #cbd5e1; }
    .badge {
      display:inline-flex; align-items:center; gap:8px;
      background: rgba(30,41,59,.8); border:1px solid rgba(148,163,184,.25);
      color:#e2e8f0; padding:8px 12px; border-radius:999px; font-size:.92rem;
    }
    .dot { width:8px; height:8px; border-radius:50%; background: var(--ok); display:inline-block; }
    .dot.warn { background: var(--warn); }
    .dot.off { background: #64748b; }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }
    .card {
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(148,163,184,.16);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .card h2, .card h3 { margin-top: 0; }
    .col-12 { grid-column: span 12; }
    .col-8 { grid-column: span 8; }
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .col-3 { grid-column: span 3; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      background: rgba(30,41,59,.72);
      border:1px solid rgba(148,163,184,.18);
      border-radius: 18px;
      padding: 14px;
    }
    .stat .label { color: var(--muted); font-size: .9rem; }
    .stat .value { font-size: 1.6rem; font-weight: 700; margin-top: 8px; }
    .stat .hint { color: var(--muted); font-size: .82rem; margin-top: 6px; }
    form { display:grid; gap:12px; }
    .row { display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; }
    .field { grid-column: span 12; }
    .field.half { grid-column: span 6; }
    .field.third { grid-column: span 4; }
    .field.two-thirds { grid-column: span 8; }
    label { display:block; margin-bottom:6px; font-weight:600; }
    input, select, textarea, button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.2);
      font: inherit;
    }
    input, select, textarea {
      background:#0b1220; color:#f8fafc; padding:12px 14px;
    }
    textarea { min-height: 110px; resize: vertical; }
    button {
      cursor:pointer; border:none; padding:12px 16px; font-weight:700;
      background: var(--brand); color:#fff; transition: .2s transform, .2s opacity, .2s background;
    }
    button:hover { opacity: .95; }
    button:active { transform: translateY(1px); }
    button[disabled] { opacity:.55; cursor:not-allowed; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-row > * { width:auto; }
    .btn-secondary { background: #334155; }
    .btn-ghost { background: transparent; border:1px solid rgba(148,163,184,.25); }
    .btn-ok { background: var(--ok); }
    .btn-warn { background: var(--warn); color:#111827; }
    .btn-danger { background: var(--danger); }
    .toolbar {
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
      margin-bottom: 12px;
    }
    .toolbar .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; flex:1; }
    .toolbar .filters input, .toolbar .filters select { width:auto; min-width: 160px; }
    .list {
      display:grid; gap:12px;
    }
    .item {
      display:grid; grid-template-columns: 92px 1fr; gap:14px;
      background: rgba(30,41,59,.75);
      border:1px solid rgba(148,163,184,.16);
      border-radius: 18px; padding: 14px;
    }
    .poster {
      width: 92px; height: 132px; object-fit: cover; border-radius: 14px;
      background: linear-gradient(180deg, #334155, #1e293b);
      border: 1px solid rgba(148,163,184,.15);
    }
    .meta { display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 8px; }
    .chip {
      background: var(--chip); color:#0f172a; border-radius:999px; padding:5px 10px; font-size:.82rem; font-weight:700;
    }
    .chip.dark { background:#334155; color:#e2e8f0; }
    .chip.new { background:#fef3c7; color:#92400e; }
    .chip.done { background:#dcfce7; color:#166534; }
    .chip.vote { background:#dbeafe; color:#1d4ed8; }
    .muted { color: var(--muted); }
    .small { font-size: .9rem; }
    .hidden { display:none !important; }
    .notice {
      padding: 12px 14px; border-radius: 14px; margin-bottom: 12px; font-size:.95rem;
      border:1px solid transparent;
    }
    .notice.info { background: rgba(37,99,235,.14); border-color: rgba(96,165,250,.24); }
    .notice.ok { background: rgba(22,163,74,.14); border-color: rgba(74,222,128,.22); }
    .notice.warn { background: rgba(245,158,11,.14); border-color: rgba(251,191,36,.2); }
    nav.tabs {
      display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 14px;
    }
    nav.tabs button {
      width:auto; padding:10px 14px; border-radius: 999px; background:#0b1220;
      border:1px solid rgba(148,163,184,.22); color:#e2e8f0; font-weight:600;
    }
    nav.tabs button.active { background: var(--brand); border-color: transparent; }
    .topbar {
      display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 14px;
      flex-wrap:wrap;
    }
    .userbox {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .login-wrap {
      min-height: calc(100vh - 40px);
      display:grid; place-items:center;
    }
    .login-card {
      width:min(480px, calc(100% - 24px));
      background: rgba(15,23,42,.88);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 26px; padding: 22px; box-shadow: var(--shadow);
    }
    .footer-note {
      margin-top: 16px; color: var(--muted); font-size: .9rem;
    }
    .comment-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(37,99,235,.12);
      border: 1px solid rgba(96,165,250,.2);
    }
    .picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, .72);
      display: grid;
      place-items: center;
      padding: 16px;
      z-index: 1000;
    }
    .picker-dialog {
      width: min(900px, 100%);
      max-height: min(80vh, 820px);
      overflow: auto;
      background: rgba(15,23,42,.98);
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .picker-option {
      background: rgba(30,41,59,.78);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 18px;
      padding: 12px;
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: start;
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease, background .14s ease;
    }
    .picker-option:hover {
      transform: translateY(-1px);
      border-color: rgba(96,165,250,.45);
      background: rgba(37,99,235,.12);
    }
    .picker-option .poster { width: 72px; height: 108px; }
    .picker-actions { display:flex; justify-content:flex-end; margin-top:14px; }
    .plex-box { margin-top: 12px; padding: 12px 14px; border-radius: 14px; border:1px solid rgba(148,163,184,.18); background: rgba(15,23,42,.55); }
    .plex-box.ok { background: rgba(22,163,74,.14); border-color: rgba(74,222,128,.24); }
    .plex-box.warn { background: rgba(245,158,11,.14); border-color: rgba(251,191,36,.2); }
    .plex-box.error { background: rgba(220,38,38,.14); border-color: rgba(248,113,113,.22); }
    .right { text-align:right; }
    @media (max-width: 980px) {
      .col-8, .col-6, .col-4, .col-3 { grid-column: span 12; }
      .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 700px) {
      .item { grid-template-columns: 1fr; }
      .poster { width: 100%; height: 220px; }
      .field.half, .field.third, .field.two-thirds { grid-column: span 12; }
      .stats { grid-template-columns: 1fr; }
      .toolbar .filters input, .toolbar .filters select { width: 100%; min-width: 0; }
      .btn-row { flex-direction: column; }
      .btn-row > * { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBNoxK5we1GymQyEqv2l9rBXh_mg77V-qI",
      authDomain: "filmonskeportal.firebaseapp.com",
      databaseURL: "https://filmonskeportal-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "filmonskeportal",
      storageBucket: "filmonskeportal.firebasestorage.app",
      messagingSenderId: "151608748582",
      appId: "1:151608748582:web:af434abef55190b959d4e7"
    };
    window.firebaseApp = null;
    window.firebaseDb = null;
    window.firebaseConnected = false;
    window.firebaseDbConnected = false;
    window.firebaseStatusText = 'Firebase ikke koblet til';
    window.firebaseConfig = firebaseConfig;
    try {
      window.firebaseApp = firebase.initializeApp(firebaseConfig);
      window.firebaseDb = firebase.database();
      window.firebaseConnected = true;
      window.firebaseStatusText = 'Firebase tilkoblet · tester Realtime Database ...';
      firebase.database().ref('.info/connected').on('value', (snapshot) => {
        const isConnected = snapshot.val() === true;
        window.firebaseDbConnected = isConnected;
        window.firebaseStatusText = isConnected
          ? 'Firebase tilkoblet · Realtime Database tilkoblet'
          : 'Firebase tilkoblet · Realtime Database frakoblet';
        if (typeof window.render === 'function') window.render();
      }, (error) => {
        window.firebaseDbConnected = false;
        window.firebaseStatusText = 'RTDB-feil: ' + (error?.message || error);
        if (typeof window.render === 'function') window.render();
      });
    } catch (err) {
      window.firebaseConnected = false;
      window.firebaseDbConnected = false;
      window.firebaseStatusText = 'Firebase-feil: ' + (err?.message || err);
      console.error('Firebase init-feil', err);
    }
  </script>
  <script>
    const STORAGE = {
      users: 'filmportal_users_v1',
      requests: 'filmportal_requests_v2',
      session: 'filmportal_session_v1',
      settings: 'filmportal_settings_v1'
    };

    const seedIfEmpty = async () => {
      if (!localStorage.getItem(STORAGE.users)) {
        const users = [
          { id: crypto.randomUUID(), username: 'admin', password: 'admin123', role: 'admin', displayName: 'Administrator', createdAt: new Date().toISOString() },
          { id: crypto.randomUUID(), username: 'bruker1', password: 'bruker123', role: 'user', displayName: 'Bruker 1', createdAt: new Date().toISOString() }
        ];
        localStorage.setItem(STORAGE.users, JSON.stringify(users));
      }

      if (!window.firebaseDb) {
        if (!localStorage.getItem(STORAGE.requests)) {
          localStorage.setItem(STORAGE.requests, JSON.stringify([
            {
              id: crypto.randomUUID(),
              title: 'The Batman',
              type: 'movie',
              requestedBy: 'bruker1',
              requestedByName: 'Bruker 1',
              requestedAt: new Date().toISOString(),
              year: '2022',
              imdbID: 'tt1877830',
              poster: 'https://m.media-amazon.com/images/M/MV5BM2...jpg',
              note: 'Gjerne i best mulig kvalitet',
              status: 'new',
              downloaded: false,
              adminSeen: false,
              adminComment: '',
              voters: ['bruker1'],
              voterNames: ['Bruker 1']
            }
          ]));
        }
        if (!localStorage.getItem(STORAGE.settings)) {
          localStorage.setItem(STORAGE.settings, JSON.stringify({ omdbApiKey: '', adminEmail: '', plexBaseUrl: '', plexToken: '', plexLibrarySectionId: '' }));
        }
        return;
      }

      try {
        const requestsSnap = await window.firebaseDb.ref('requests').once('value');
        if (!requestsSnap.exists()) {
          const newRef = window.firebaseDb.ref('requests').push();
          await newRef.set({
            title: 'The Batman',
            type: 'movie',
            requestedBy: 'bruker1',
            requestedByName: 'Bruker 1',
            requestedAt: new Date().toISOString(),
            year: '2022',
            imdbID: 'tt1877830',
            poster: 'https://m.media-amazon.com/images/M/MV5BM2...jpg',
            note: 'Gjerne i best mulig kvalitet',
            status: 'new',
            downloaded: false,
            adminSeen: false,
            adminComment: '',
            voters: ['bruker1'],
            voterNames: ['Bruker 1']
          });
        }
        const settingsSnap = await window.firebaseDb.ref('settings').once('value');
        if (!settingsSnap.exists()) {
          await window.firebaseDb.ref('settings').set({ omdbApiKey: '', adminEmail: '', plexBaseUrl: '', plexToken: '', plexLibrarySectionId: '' });
        }
      } catch (err) {
        console.error('Seed mot Realtime Database feilet', err);
      }
    };

    const getUsers = () => JSON.parse(localStorage.getItem(STORAGE.users) || '[]');
    const saveUsers = (users) => localStorage.setItem(STORAGE.users, JSON.stringify(users));
    const getSession = () => JSON.parse(localStorage.getItem(STORAGE.session) || 'null');
    const saveSession = (session) => localStorage.setItem(STORAGE.session, JSON.stringify(session));
    const escapeHtml = (s='') => String(s)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
    const fmtDate = (iso) => {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString('no-NO'); } catch { return iso; }
    };
    const normalizeText = (s='') => String(s).trim().toLowerCase().replace(/\s+/g, ' ');
    const unique = (arr=[]) => [...new Set((arr || []).filter(Boolean))];

    function getFirebaseStatus() {
      if (window.firebaseStatusText && String(window.firebaseStatusText).startsWith('RTDB-feil:')) {
        return { text: window.firebaseStatusText, dotClass: 'off' };
      }
      if (window.firebaseStatusText && String(window.firebaseStatusText).startsWith('Firebase-feil:')) {
        return { text: window.firebaseStatusText, dotClass: 'off' };
      }
      if (window.firebaseConnected === true && window.firebaseDbConnected === true) {
        return { text: window.firebaseStatusText || 'Firebase tilkoblet · Realtime Database tilkoblet', dotClass: '' };
      }
      if (window.firebaseConnected === true) {
        return { text: window.firebaseStatusText || 'Firebase tilkoblet · Realtime Database frakoblet', dotClass: 'warn' };
      }
      if (window.firebaseConfig) {
        return { text: window.firebaseStatusText || 'Firebase konfigurert', dotClass: 'warn' };
      }
      return { text: 'Firebase ikke koblet til', dotClass: 'off' };
    }

    function ensureRequestShape(r) {
      const voters = unique((Array.isArray(r.voters) ? r.voters : []).concat(r.requestedBy ? [r.requestedBy] : []));
      let voterNames = Array.isArray(r.voterNames) ? r.voterNames.filter(Boolean) : [];
      if (r.requestedByName && !voterNames.includes(r.requestedByName)) voterNames.unshift(r.requestedByName);
      voterNames = unique(voterNames);
      return {
        status: 'new',
        downloaded: false,
        adminSeen: false,
        adminComment: '',
        voters,
        voterNames,
        ...r,
        voters,
        voterNames,
        voteCount: voters.length || 0
      };
    }

    async function getRequests() {
      if (!window.firebaseDb) {
        return JSON.parse(localStorage.getItem(STORAGE.requests) || '[]').map(ensureRequestShape);
      }
      const snapshot = await window.firebaseDb.ref('requests').once('value');
      const data = snapshot.val() || {};
      return Object.entries(data).map(([id, value]) => ensureRequestShape({ id, ...value }));
    }

    async function saveRequests(requests) {
      if (!window.firebaseDb) {
        localStorage.setItem(STORAGE.requests, JSON.stringify(requests));
        return;
      }
      const mapped = {};
      for (const item of requests) {
        const normalized = ensureRequestShape(item);
        const copy = { ...normalized };
        const id = copy.id || crypto.randomUUID();
        delete copy.id;
        delete copy.voteCount;
        mapped[id] = copy;
      }
      await window.firebaseDb.ref('requests').set(mapped);
    }

    async function getSettings() {
      if (!window.firebaseDb) {
        return JSON.parse(localStorage.getItem(STORAGE.settings) || '{"omdbApiKey":"","adminEmail":"","plexBaseUrl":"","plexToken":"","plexLibrarySectionId":""}');
      }
      const snapshot = await window.firebaseDb.ref('settings').once('value');
      const data = snapshot.val() || { omdbApiKey: '', adminEmail: '', plexBaseUrl: '', plexToken: '', plexLibrarySectionId: '' };
      localStorage.setItem(STORAGE.settings, JSON.stringify(data));
      return data;
    }

    async function saveSettings(settings) {
      localStorage.setItem(STORAGE.settings, JSON.stringify(settings));
      if (!window.firebaseDb) return;
      await window.firebaseDb.ref('settings').set(settings);
    }

    let state = {
      view: 'dashboard',
      filterText: '',
      filterType: 'all',
      filterStatus: 'all',
      filterSort: 'newest'
    };

    async function login(username, password) {
      const user = getUsers().find(u => u.username === username && u.password === password);
      if (!user) return false;
      saveSession({ id: user.id, username: user.username, role: user.role, displayName: user.displayName });
      return true;
    }

    function logout() {
      localStorage.removeItem(STORAGE.session);
      render();
    }

    function createUser({ username, password, displayName, role }) {
      const users = getUsers();
      if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
        throw new Error('Brukernavnet finnes allerede.');
      }
      users.push({ id: crypto.randomUUID(), username, password, displayName, role, createdAt: new Date().toISOString() });
      saveUsers(users);
    }

    async function searchOmdb(title, type) {
      const { omdbApiKey } = await getSettings();
      if (!omdbApiKey) throw new Error('Legg inn OMDb API-nøkkel under Innstillinger først.');
      const url = `https://www.omdbapi.com/?apikey=${encodeURIComponent(omdbApiKey)}&s=${encodeURIComponent(title)}${type && type !== 'any' ? `&type=${encodeURIComponent(type)}` : ''}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.Response === 'False') throw new Error(data.Error || 'Fant ikke tittel.');
      return data.Search || [];
    }
    async function getOmdbById(imdbID) {
      const { omdbApiKey } = await getSettings();
      if (!omdbApiKey) throw new Error('Legg inn OMDb API-nøkkel under Innstillinger først.');
      const url = `https://www.omdbapi.com/?apikey=${encodeURIComponent(omdbApiKey)}&i=${encodeURIComponent(imdbID)}&plot=short`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.Response === 'False') throw new Error(data.Error || 'Fant ikke tittel.');
      return data;
    }
    function closeOmdbPicker() {
      const el = document.getElementById('omdbPickerOverlay');
      if (el) el.remove();
    }
    async function openOmdbPicker(results) {
      closeOmdbPicker();
      return await new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.id = 'omdbPickerOverlay';
        overlay.className = 'picker-overlay';
        overlay.innerHTML = `
          <div class="picker-dialog">
            <div class="toolbar" style="margin-bottom:0;">
              <div>
                <h2 style="margin:0;">Velg riktig tittel</h2>
                <div class="muted small">Vi fant flere treff. Velg filmen eller serien du mener.</div>
              </div>
              <button class="btn-ghost" style="width:auto;" id="closeOmdbPickerBtn">Lukk</button>
            </div>
            <div class="picker-grid">
              ${results.map(item => `
                <button type="button" class="picker-option" data-imdb-id="${escapeHtml(item.imdbID || '')}">
                  <img class="poster" src="${getPoster(item.Poster)}" alt="Plakat for ${escapeHtml(item.Title || '')}" onerror="this.src='${getPoster('')}'" />
                  <div>
                    <strong>${escapeHtml(item.Title || 'Ukjent tittel')}</strong>
                    <div class="small muted" style="margin-top:6px;">${escapeHtml(item.Year || 'Ukjent år')} · ${item.Type === 'series' ? 'Serie' : 'Film'}</div>
                    <div class="small muted" style="margin-top:6px;">IMDb-ID: ${escapeHtml(item.imdbID || 'ukjent')}</div>
                  </div>
                </button>
              `).join('')}
            </div>
            <div class="picker-actions">
              <button type="button" class="btn-secondary" id="cancelOmdbPickerBtn">Avbryt</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        const cleanup = (value) => { closeOmdbPicker(); resolve(value); };
        overlay.querySelector('#closeOmdbPickerBtn')?.addEventListener('click', () => cleanup(null));
        overlay.querySelector('#cancelOmdbPickerBtn')?.addEventListener('click', () => cleanup(null));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(null); });
        overlay.querySelectorAll('.picker-option').forEach((btn) => {
          btn.addEventListener('click', () => cleanup(btn.getAttribute('data-imdb-id')));
        });

    async function checkPlexLibrary(title) {
      const settings = await getSettings();
      const baseUrl = String(settings.plexBaseUrl || '').trim().replace(/\/$/, '');
      const plexToken = String(settings.plexToken || '').trim();
      const sectionId = String(settings.plexLibrarySectionId || '').trim();
      if (!baseUrl || !plexToken) return { configured: false, matches: [] };
      const qs = new URLSearchParams({ query: title, 'X-Plex-Token': plexToken });
      if (sectionId) qs.set('sectionId', sectionId);
      const url = `${baseUrl}/hubs/search?${qs.toString()}`;
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('Plex-søk feilet (' + res.status + '). Sjekk URL/token eller CORS.');
      const data = await res.json();
      const containers = Array.isArray(data?.MediaContainer?.Hub) ? data.MediaContainer.Hub : [];
      const matches = [];
      for (const hub of containers) {
        const items = Array.isArray(hub?.Metadata) ? hub.Metadata : [];
        for (const item of items) {
          matches.push({
            title: item.title || '',
            year: item.year || '',
            type: item.type || '',
            library: hub.title || '',
            ratingKey: item.ratingKey || '',
            thumb: item.thumb || ''
          });
        }
      }
      return { configured: true, matches };
    }
    function renderPlexStatus(result, selectedTitle='') {
      const box = document.getElementById('plexStatus');
      if (!box) return;
      if (!result || result.configured === false) {
        box.className = 'plex-box warn';
        box.innerHTML = '<strong>Plex ikke konfigurert</strong><div class="small muted" style="margin-top:6px;">Legg inn Plex URL og token under Innstillinger for å sjekke om filmen allerede finnes.</div>';
        return;
      }
      const uniqueMatches = [];
      const seen = new Set();
      for (const item of (result.matches || [])) {
        const key = [normalizeText(item.title), item.year, item.library].join('|');
        if (seen.has(key)) continue;
        seen.add(key);
        uniqueMatches.push(item);
      }
      const filtered = uniqueMatches.filter(item => normalizeText(item.title).includes(normalizeText(selectedTitle)));
      const list = (filtered.length ? filtered : uniqueMatches).slice(0, 6);
      if (!list.length) {
        box.className = 'plex-box';
        box.innerHTML = '<strong>Ikke funnet i Plex</strong><div class="small muted" style="margin-top:6px;">Ingen tydelige treff i Plex på denne tittelen.</div>';
        return;
      }
      box.className = 'plex-box ok';
      box.innerHTML = `<strong>Finnes i Plex</strong><div class="small muted" style="margin-top:6px;">Vi fant ${list.length} treff.</div><div style="margin-top:8px; display:grid; gap:8px;">${list.map(item => `<div><strong>${escapeHtml(item.title || 'Ukjent tittel')}</strong> <span class="muted small">${escapeHtml(String(item.year || ''))}${item.library ? ' · ' + escapeHtml(item.library) : ''}</span></div>`).join('')}</div>`;
    }

    function findDuplicateRequest(requests, payload) {
      const imdb = normalizeText(payload.imdbID || '');
      const title = normalizeText(payload.title || '');
      const type = normalizeText(payload.type || '');
      return requests.find(r => {
        const sameImdb = imdb && normalizeText(r.imdbID || '') && normalizeText(r.imdbID || '') === imdb;
        const sameTitle = !imdb && normalizeText(r.title || '') === title && normalizeText(r.type || '') === type;
        return sameImdb || sameTitle;
      });
    }

    async function createRequest(payload) {
      const session = getSession();
      const requests = await getRequests();
      const duplicate = findDuplicateRequest(requests, payload);
      if (duplicate) {
        if ((duplicate.voters || []).includes(session.username)) {
          return { mode: 'duplicate-already-voted', item: duplicate };
        }
        await voteForRequest(duplicate.id);
        return { mode: 'duplicate-voted', item: duplicate };
      }

      const request = ensureRequestShape({
        requestedBy: session.username,
        requestedByName: session.displayName || session.username,
        requestedAt: new Date().toISOString(),
        status: 'new',
        downloaded: false,
        adminSeen: false,
        adminComment: '',
        voters: [session.username],
        voterNames: [session.displayName || session.username],
        ...payload
      });

      if (!window.firebaseDb) {
        requests.unshift({ id: crypto.randomUUID(), ...request });
        await saveRequests(requests);
        return { mode: 'created' };
      }
      const ref = await window.firebaseDb.ref('requests').push();
      const saveData = { ...request };
      delete saveData.id;
      delete saveData.voteCount;
      await ref.set(saveData);
      return { mode: 'created' };
    }

    async function updateRequest(id, patch) {
      if (!window.firebaseDb) {
        const requests = (await getRequests()).map(r => r.id === id ? ensureRequestShape({ ...r, ...patch }) : ensureRequestShape(r));
        await saveRequests(requests);
        return;
      }
      const cleanPatch = { ...patch };
      delete cleanPatch.id;
      delete cleanPatch.voteCount;
      await window.firebaseDb.ref(`requests/${id}`).update(cleanPatch);
    }

    async function deleteRequest(id) {
      if (!window.firebaseDb) {
        const requests = await getRequests();
        await saveRequests(requests.filter(r => r.id !== id));
        return;
      }
      await window.firebaseDb.ref(`requests/${id}`).remove();
    }

    async function voteForRequest(id) {
      const session = getSession();
      const requests = await getRequests();
      const item = requests.find(r => r.id === id);
      if (!item) throw new Error('Fant ikke ønsket.');
      const voters = unique((item.voters || []).concat([session.username]));
      const voterNames = unique((item.voterNames || []).concat([session.displayName || session.username]));
      await updateRequest(id, { voters, voterNames });
    }

    function deleteUser(id) {
      const session = getSession();
      const users = getUsers();
      const user = users.find(u => u.id === id);
      if (!user) return;
      if (user.username === 'admin') throw new Error('Standard admin kan ikke slettes i denne demoen.');
      if (session?.id === id) throw new Error('Du kan ikke slette brukeren du er logget inn som.');
      saveUsers(users.filter(u => u.id !== id));
    }

    async function markAdminSeenAll() {
      const requests = await getRequests();
      if (!window.firebaseDb) {
        await saveRequests(requests.map(r => ensureRequestShape({ ...r, adminSeen: true })));
        return;
      }
      const updates = {};
      requests.forEach(r => { updates[`${r.id}/adminSeen`] = true; });
      await window.firebaseDb.ref('requests').update(updates);
    }

    function matchesFilter(r) {
      const text = state.filterText.trim().toLowerCase();
      const typeOk = state.filterType === 'all' || r.type === state.filterType;
      const statusOk = state.filterStatus === 'all'
        || (state.filterStatus === 'downloaded' && r.downloaded)
        || (state.filterStatus === 'wanted' && !r.downloaded)
        || (state.filterStatus === 'new' && !r.adminSeen);
      const haystack = [r.title, r.requestedBy, r.requestedByName, r.year, r.note, r.adminComment, ...(r.voterNames || [])]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
      const textOk = !text || haystack.includes(text);
      return typeOk && statusOk && textOk;
    }

    function applySort(items) {
      const list = [...items];
      switch (state.filterSort) {
        case 'oldest':
          return list.sort((a, b) => new Date(a.requestedAt || 0) - new Date(b.requestedAt || 0));
        case 'title':
          return list.sort((a, b) => String(a.title || '').localeCompare(String(b.title || ''), 'no'));
        case 'mostVoted':
          return list.sort((a, b) => (b.voteCount || 0) - (a.voteCount || 0) || new Date(b.requestedAt || 0) - new Date(a.requestedAt || 0));
        case 'notDownloaded':
          return list.sort((a, b) => Number(a.downloaded) - Number(b.downloaded) || new Date(b.requestedAt || 0) - new Date(a.requestedAt || 0));
        case 'newest':
        default:
          return list.sort((a, b) => new Date(b.requestedAt || 0) - new Date(a.requestedAt || 0));
      }
    }

      const adminComment = r.adminComment

                  <button type="submit">Opprett bruker</button>
                </form>
                <div id="userMsg" class="footer-note"></div>
              </div>
              <div class="col-8 card">
                <div class="toolbar">
                  <h2 style="margin:0;">Brukere</h2>
                  <div class="muted small">Admin kan opprette nye brukere her.</div>
                </div>
                <div class="list">
                  ${users.map(u => `
                    <div class="item" style="grid-template-columns:1fr;">
                      <div class="toolbar" style="margin:0;">
                        <div>
                          <strong>${escapeHtml(u.displayName || u.username)}</strong>
                          <div class="small muted">${escapeHtml(u.username)} · ${u.role === 'admin' ? 'Admin' : 'Bruker'} · Opprettet ${fmtDate(u.createdAt)}</div>
                        </div>
                        ${u.username !== 'admin' ? `<button class="btn-danger" style="width:auto;" onclick="removeUser('${u.id}')">Slett</button>` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          <div ${state.view !== 'settings' ? 'class="hidden"' : ''}>
            <div class="grid">
              <div class="col-6 card">
                <h2>Innstillinger</h2>
                <div class="notice info" style="margin-top:10px;">Status akkurat nå: <strong>${firebaseStatus.text}</strong></div>
                <form id="settingsForm">
                  <div>
                    <label for="omdbApiKey">OMDb API-nøkkel</label>
                    <input id="omdbApiKey" value="${escapeHtml(settings.omdbApiKey || '')}" placeholder="F.eks. xxxxxxxx" />
                  </div>
                  <div>
                    <label for="adminEmail">Admin e-post (for senere varsling)</label>
                    <input id="adminEmail" value="${escapeHtml(settings.adminEmail || '')}" placeholder="navn@firma.no" />
                  </div>
                  <div>
                    <label for="plexBaseUrl">Plex base URL</label>
                    <input id="plexBaseUrl" value="${escapeHtml(settings.plexBaseUrl || '')}" placeholder="https://din-server.plex.direct:32400" />
                  </div>
                  <div>
                    <label for="plexToken">Plex token</label>
                    <input id="plexToken" value="${escapeHtml(settings.plexToken || '')}" placeholder="X-Plex-Token" />
                  </div>
                  <div>
                    <label for="plexLibrarySectionId">Plex sectionId (valgfritt)</label>
                    <input id="plexLibrarySectionId" value="${escapeHtml(settings.plexLibrarySectionId || '')}" placeholder="F.eks. 1 for Filmer" />
                  </div>
                  <button type="submit">Lagre innstillinger</button>
                </form>
                <div class="btn-row" style="margin-top:10px;">
                  <button type="button" class="btn-secondary" onclick="testFirebaseDbConnection()">Test Realtime Database nå</button>
                </div>
                <div id="settingsMsg" class="footer-note"></div>
              </div>
              <div class="col-6 card">
                <h2>Hva er nytt</h2>
                <div class="notice ok">
                  Denne versjonen har fått <strong>Mine ønsker</strong>, <strong>admin-kommentar</strong>, <strong>stemme-funksjon</strong> og <strong>sortering</strong>.
                </div>
                <ul class="small muted">
                  <li>Brukere kan stemme på eksisterende ønsker.</li>
                  <li>Duplikater blir nå automatisk slått sammen via stemmer.</li>
                  <li>Admin kan legge inn kommentar direkte på ønsket.</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      `;

      const requestForm = document.getElementById('requestForm');
      if (requestForm) {
        requestForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const payload = {
            title: document.getElementById('title').value.trim(),
            type: document.getElementById('type').value,
            year: document.getElementById('year').value.trim(),
            imdbID: document.getElementById('imdbID').value.trim(),
            poster: document.getElementById('poster').value.trim(),
            note: document.getElementById('note').value.trim()
          };
          if (!payload.title) return;
          const result = await createRequest(payload);
          const msg = document.getElementById('requestMsg');
          if (result.mode === 'created') {
            msg.textContent = 'Ønsket er lagret.';
            msg.style.color = '#86efac';
          } else if (result.mode === 'duplicate-voted') {
            msg.textContent = 'Tittelen finnes allerede. Stemmen din ble lagt til på eksisterende ønske.';
            msg.style.color = '#86efac';
          } else {
            msg.textContent = 'Tittelen finnes allerede, og du har allerede stemt på den.';
            msg.style.color = '#fcd34d';
          }
          requestForm.reset();
          await render();
          setTimeout(async () => { state.view = 'requests'; await render(); }, 450);
        });
      }

      const userForm = document.getElementById('userForm');
      if (userForm) {
        userForm.addEventListener('submit', (e) => {
          e.preventDefault();
          try {
            createUser({
              displayName: document.getElementById('displayName').value.trim(),
              username: document.getElementById('username').value.trim(),
              password: document.getElementById('password').value,
              role: document.getElementById('role').value
            });
            document.getElementById('userMsg').textContent = 'Bruker opprettet.';
            document.getElementById('userMsg').style.color = '#86efac';
            userForm.reset();
            render();
          } catch (err) {
            document.getElementById('userMsg').textContent = err.message;
            document.getElementById('userMsg').style.color = '#fca5a5';
          }
        });
      }

      const settingsForm = document.getElementById('settingsForm');
      if (settingsForm) {
        settingsForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          await saveSettings({
            omdbApiKey: document.getElementById('omdbApiKey').value.trim(),
            adminEmail: document.getElementById('adminEmail').value.trim(),
            plexBaseUrl: document.getElementById('plexBaseUrl').value.trim(),
            plexToken: document.getElementById('plexToken').value.trim(),
            plexLibrarySectionId: document.getElementById('plexLibrarySectionId').value.trim()
          });
          const el = document.getElementById('settingsMsg');
          el.textContent = 'Innstillinger lagret.';
          el.style.color = '#86efac';
        });
      }
    }

    window.setView = async (view) => { state.view = view; await render(); };
    window.setFilterText = async (val) => { state.filterText = val; await render(); };
    window.setFilterType = async (val) => { state.filterType = val; await render(); };
    window.setFilterStatus = async (val) => { state.filterStatus = val; await render(); };
    window.setFilterSort = async (val) => { state.filterSort = val; await render(); };
    window.toggleDownloaded = async (id) => {
      const r = (await getRequests()).find(x => x.id === id);
      if (!r) return;
      await updateRequest(id, { downloaded: !r.downloaded, status: !r.downloaded ? 'downloaded' : 'new' });
      await render();
    };
    window.markSeen = async (id) => { await updateRequest(id, { adminSeen: true }); await render(); };
    window.markAllSeen = async () => { await markAdminSeenAll(); await render(); };
    window.removeUser = (id) => {
      if (!confirm('Slette bruker?')) return;
      try { deleteUser(id); render(); } catch (err) { alert(err.message); }
    };
    window.removeRequest = async (id) => {
      if (!confirm('Slette dette ønsket?')) return;
      try {
        await deleteRequest(id);
        await render();
      } catch (err) {
        alert(err.message || 'Kunne ikke slette ønsket.');
      }
    };
    window.voteRequest = async (id) => {
      try {
        await voteForRequest(id);
        await render();
      } catch (err) {
        alert(err.message || 'Kunne ikke legge til stemme.');
      }
    };
    window.editAdminComment = async (id) => {
      const requests = await getRequests();
      const item = requests.find(r => r.id === id);
      if (!item) return;
      const value = prompt('Skriv admin-kommentar:', item.adminComment || '');
      if (value === null) return;
      await updateRequest(id, { adminComment: value.trim() });
      await render();
    };
    window.lookupTitle = async () => {
      const title = document.getElementById('title')?.value.trim();
      const type = document.getElementById('type')?.value;
      const msg = document.getElementById('requestMsg');
      if (!title) {
        msg.textContent = 'Skriv inn en tittel først.';
        msg.style.color = '#fca5a5';
        return;
      }
      msg.textContent = 'Søker i IMDb og Plex ...';
      msg.style.color = '#93c5fd';
      try {
        const results = await searchOmdb(title, type);
        let selected = results[0] || null;
        if (results.length > 1) {
          msg.textContent = `Fant ${results.length} treff. Velg riktig tittel i lista.`;
          msg.style.color = '#93c5fd';
          const chosenImdbId = await openOmdbPicker(results.slice(0, 12));
          if (!chosenImdbId) {
            msg.textContent = 'Valg avbrutt.';
            msg.style.color = '#fcd34d';
            return;
          }
          selected = results.find(item => item.imdbID === chosenImdbId) || selected;
        }
        if (!selected?.imdbID) throw new Error('Fant ikke gyldig tittel.');
        const data = await getOmdbById(selected.imdbID);
        document.getElementById('year').value = data.Year || '';
        document.getElementById('imdbID').value = data.imdbID || '';
        document.getElementById('poster').value = data.Poster && data.Poster !== 'N/A' ? data.Poster : '';
        document.getElementById('type').value = data.Type === 'series' ? 'series' : 'movie';
        document.getElementById('title').value = data.Title || title;
        msg.textContent = `Valgt: ${data.Title} (${data.Year || 'ukjent år'})`;
        msg.style.color = '#86efac';
        try {
          const plexResult = await checkPlexLibrary(data.Title || title);
          renderPlexStatus(plexResult, data.Title || title);
        } catch (plexErr) {
          const box = document.getElementById('plexStatus');
          if (box) {
            box.className = 'plex-box error';
            box.innerHTML = `<strong>Plex-sjekk feilet</strong><div class="small muted" style="margin-top:6px;">${escapeHtml(plexErr.message || 'Kunne ikke kontakte Plex.')}</div>`;
          }
        }
      } catch (err) {
        msg.textContent = err.message;
        msg.style.color = '#fca5a5';
      }
    };
    window.testFirebaseDbConnection = async () => {
      const status = getFirebaseStatus();
      alert('Status akkurat nå: ' + status.text);
      await render();
    };

    async function render() {
      await seedIfEmpty();
      const session = getSession();
      if (!session) return renderLogin();
      return await renderApp();
    }

    window.render = render;
    render();
  </script>
</body>
</html>
